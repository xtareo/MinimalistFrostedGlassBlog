<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XXX的博客管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
    }
    h2 {
      text-align: center;
      color: #2d3748;
      font-weight: 600;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #4a5568;
      font-weight: 500;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
    }
    .error-message {
      background: #fff5f5;
      color: #c53030;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      border: 1px solid #feb2b2;
    }
    .captcha-group { margin-bottom: 1.5rem; }
    .captcha-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .captcha-row img {
      height: 45px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid #e2e8f0;
    }
    .captcha-row input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      letter-spacing: 4px;
      font-family: 'JetBrains Mono', monospace;
    }
    .btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      margin-top: 0.5rem;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(102,126,234,0.3);
    }
    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>📝 博客管理</h2>
    <p class="subtitle">请登录以继续</p>
    {% if error %}
    <div class="error-message">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      <div class="form-group captcha-group">
        <label for="captcha">验证码</label>
        <div class="captcha-row">
          <img id="captchaImg" src="{{ url_for('captcha') }}" alt="验证码" onclick="refreshCaptcha()" title="点击刷新">
          <input type="text" id="captcha" name="captcha" placeholder="请输入验证码" required autocomplete="off" maxlength="4">
        </div>
      </div>
      <button type="submit" class="btn">登 录</button>
    </form>
  </div>
  <script>
    function refreshCaptcha() {
      const img = document.getElementById('captchaImg');
      img.src = '{{ url_for("captcha") }}?' + new Date().getTime();
    }
  </script>
</body>
</html>
